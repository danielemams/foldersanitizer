# Product alias map — single source of truth.
#
# Maps alternative product names (slugs) to canonical resolver types.
# Used by Sanitizer.java, ProductDetector.java, and initcaseenv.sh.
#
# Format: alias=canonical_type
# Lines starting with # are comments. Empty lines are ignored.
#
# The canonical type must match a resolver file: lib/initcaseenv/lib/resolve-<type>.sh
# To add a new alias: add a line here. No code changes needed.
#
# Author: Daniele Mammarella <dmammare@redhat.com>

# Keycloak / RHBK → rhbk
keycloak=rhbk
red-hat-build-of-keycloak=rhbk
rh-build-of-keycloak=rhbk

# Red Hat SSO (Keycloak 7.x) → sso
rhsso=sso
rh-sso=sso
single-sign-on=sso
red-hat-single-sign-on=sso

# JBoss EAP / WildFly → eap
jboss=eap
wildfly=eap
enterprise-application-platform=eap
red-hat-jboss-enterprise-application-platform=eap
jboss-eap=eap

# AMQ Broker / ActiveMQ Artemis → amq
activemq=amq
artemis=amq
amq-broker=amq
red-hat-amq-broker=amq
amq-streams=amq
red-hat-amq=amq

# Fuse / Camel → fuse
camel=fuse
red-hat-fuse=fuse
jboss-fuse=fuse

# Data Grid / Infinispan → datagrid
infinispan=datagrid
red-hat-data-grid=datagrid
jboss-data-grid=datagrid

# 3scale → 3scale
red-hat-3scale-api-management=3scale
3scale-api-management=3scale

# OpenShift → openshift
red-hat-openshift-container-platform=openshift
ocp=openshift
