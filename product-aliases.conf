# Product alias map — single source of truth.
#
# Maps alternative product names (slugs) to canonical resolver types.
# Used by both initcaseenv-agent-common.sh and sanitizer.py.
#
# Format: alias=canonical_type
# Lines starting with # are comments. Empty lines are ignored.
#
# The canonical type must match a resolver file: lib/case/env/lib/resolve-<type>.sh
# To add a new alias: add a line here. No code changes needed.
#
# Author: Daniele Mammarella <dmammare@redhat.com>

# Keycloak / RHBK → rhbk
keycloak=rhbk

# Red Hat SSO (Keycloak 7.x) → sso
rhsso=sso
rh-sso=sso
single-sign-on=sso

# JBoss EAP / WildFly → eap
jboss=eap
wildfly=eap
enterprise-application-platform=eap

# AMQ Broker / ActiveMQ Artemis → amq
activemq=amq
artemis=amq
amq-broker=amq
